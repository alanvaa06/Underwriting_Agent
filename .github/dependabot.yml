version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      langchain:
        patterns:
          - "langchain*"
          - "langgraph*"
      fastapi-stack:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "starlette*"
          - "sse-starlette"
          - "pydantic*"
      dev-tools:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "httpx"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
